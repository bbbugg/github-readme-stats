name: Upstream Sync

permissions:
  contents: write
  actions: write

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_PAT }}
          ref: master
          fetch-depth: 0

      - name: Setup Git User
        run: |
          git config --global user.name "bbbugg"
          git config --global user.email "daming20120101@163.com"

      - name: Manual Sync upstream changes
        id: sync
        run: |
          set -e
          git remote add upstream https://github.com/anuraghazra/github-readme-stats.git || true
          git fetch upstream master
          git checkout master
          git merge upstream/master --no-ff -m "Action: 自动同步上游代码"
          if git diff --name-only --diff-filter=U | grep -q . ; then
            echo "Merge conflict detected in master branch. Files need manual resolution:"
            git diff --name-only --diff-filter=U
            exit 1
          fi
          git push origin master --force-with-lease=master:origin/master
